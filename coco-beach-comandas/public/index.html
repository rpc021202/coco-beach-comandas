<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a1628">
  <title>Coco Beach - Comandas</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{--bg:#0a1628;--sf:#141f35;--sf2:#1e2d4a;--br:#2a3f60;--tx:#f0f4ff;--mu:#7a90b8;--gr:#22c55e;--gd:#15803d;--re:#ef4444;--ac:#3b82f6;--am:#f59e0b;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    #app{display:flex;flex-direction:column;height:100dvh;}
    .hdr{background:var(--sf);border-bottom:1px solid var(--br);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .logo{font-size:15px;font-weight:800;color:#f0a030;white-space:nowrap;}
    .mw{display:flex;align-items:center;gap:6px;flex:1;}
    .ml{font-size:13px;color:var(--mu);}
    .mi{background:var(--sf2);border:2px solid var(--br);border-radius:8px;color:var(--tx);font-size:20px;font-weight:800;padding:4px 10px;width:72px;text-align:center;-moz-appearance:textfield;}
    .mi::-webkit-outer-spin-button,.mi::-webkit-inner-spin-button{-webkit-appearance:none;}
    .mi:focus{border-color:var(--ac);outline:none;}
    .ct{background:var(--gd);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:14px;font-weight:700;padding:8px 12px;display:flex;align-items:center;gap:6px;}
    .bdg{background:var(--re);border-radius:99px;font-size:11px;font-weight:800;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
    .main{flex:1;overflow-y:auto;padding:12px;}
    .cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .cb{border:none;border-radius:14px;color:#fff;cursor:pointer;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform 0.1s;position:relative;width:100%;}
    .cb:active{transform:scale(0.93);}
    .cem{font-size:28px;line-height:1;}
    .cnm{font-size:14px;font-weight:700;}
    .cct{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.4);border-radius:99px;font-size:11px;font-weight:800;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
    .bb{background:var(--sf2);border:1px solid var(--br);border-radius:8px;color:var(--mu);cursor:pointer;font-size:14px;font-weight:600;padding:8px 14px;margin-bottom:12px;}
    .ch{font-size:18px;font-weight:800;margin-bottom:12px;}
    .pg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .pb{background:var(--sf2);border:2px solid var(--br);border-radius:12px;color:var(--tx);cursor:pointer;padding:14px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;transition:transform 0.1s;width:100%;}
    .pb:active{transform:scale(0.93);}
    .pb.ic{border-color:var(--gr);background:#0d2118;}
    .pb.cfg{border-color:var(--am);border-style:dashed;}
    .pn{font-size:13px;font-weight:700;line-height:1.2;}
    .pp{font-size:12px;color:var(--mu);}
    .pbdg{position:absolute;top:-8px;right:-8px;background:var(--gr);border-radius:50%;color:#fff;font-size:12px;font-weight:800;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
    /* Configurador */
    .cfo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:60;}
    .cfo.open{display:flex;align-items:flex-end;}
    .cfp{background:var(--sf);border-radius:20px 20px 0 0;border-top:1px solid var(--br);max-height:92vh;overflow-y:auto;padding:16px;width:100%;}
    .cfh{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
    .cft{font-size:17px;font-weight:800;}
    .cfc{background:var(--sf2);border:1px solid var(--br);border-radius:8px;color:var(--mu);cursor:pointer;font-size:13px;padding:6px 12px;}
    .cfpr{font-size:12px;color:var(--mu);margin-bottom:8px;}
    .cfsum{background:var(--sf2);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:13px;color:var(--am);min-height:34px;}
    .cfst{font-size:15px;font-weight:700;margin-bottom:10px;}
    .cfgd{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
    .copt{background:var(--sf2);border:2px solid var(--br);border-radius:10px;color:var(--tx);cursor:pointer;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;line-height:1.2;width:100%;}
    .copt.sel{border-color:var(--gr);background:#0d2118;color:var(--gr);}
    .copt-p{font-size:11px;color:var(--mu);display:block;margin-top:3px;}
    .copt.sel .copt-p{color:var(--gr);}
    .cfbr{display:flex;gap:10px;}
    .cfbk{background:var(--sf2);border:1px solid var(--br);border-radius:10px;color:var(--mu);cursor:pointer;font-size:14px;font-weight:600;padding:14px 18px;}
    .cfnx{background:var(--gr);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:16px;font-weight:800;padding:14px;flex:1;}
    .cfnx:disabled{background:var(--sf2);color:var(--mu);}
    /* Carrito */
    .ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:50;}
    .ovl.open{display:flex;align-items:flex-end;}
    .ctp{background:var(--sf);border-radius:20px 20px 0 0;border-top:1px solid var(--br);max-height:88vh;overflow-y:auto;padding:16px;width:100%;}
    .ctph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .ctpt{font-size:17px;font-weight:800;}
    .clb{background:var(--sf2);border:1px solid var(--br);border-radius:8px;color:var(--mu);cursor:pointer;font-size:13px;padding:6px 12px;}
    .cmi{background:var(--sf2);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:14px;color:var(--mu);}
    .cmi strong{color:var(--tx);}
    .ci{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--sf2);}
    .cin{flex:1;font-size:13px;font-weight:600;line-height:1.3;}
    .cip{font-size:13px;color:var(--mu);white-space:nowrap;}
    .qc{display:flex;align-items:center;gap:5px;}
    .qb{background:var(--sf2);border:1px solid var(--br);border-radius:6px;color:var(--tx);cursor:pointer;font-size:18px;font-weight:700;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
    .qn{font-size:16px;font-weight:800;min-width:22px;text-align:center;}
    .totl{display:flex;justify-content:space-between;padding:12px 0 4px;font-size:16px;font-weight:800;border-top:1px solid var(--br);margin-top:4px;}
    .nw{margin:14px 0;}
    .nl{font-size:12px;color:var(--mu);margin-bottom:6px;}
    .ni{background:var(--sf2);border:1px solid var(--br);border-radius:8px;color:var(--tx);font-size:14px;padding:10px 12px;width:100%;resize:none;}
    .ni:focus{border-color:var(--ac);outline:none;}
    .sb{background:var(--gr);border:none;border-radius:12px;color:#fff;cursor:pointer;font-size:18px;font-weight:800;padding:16px;width:100%;margin-bottom:10px;}
    .sb:disabled{background:var(--sf2);color:var(--mu);}
    .xb{background:transparent;border:1px solid var(--re);border-radius:10px;color:var(--re);cursor:pointer;font-size:14px;font-weight:600;padding:10px;width:100%;}
    .ec{text-align:center;color:var(--mu);padding:24px;font-size:14px;}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2a1a;border:1px solid var(--gr);border-radius:10px;color:var(--gr);font-size:14px;font-weight:700;padding:10px 20px;z-index:200;opacity:0;transition:opacity .25s,transform .25s;white-space:nowrap;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.err{background:#2a1a1a;border-color:var(--re);color:var(--re);}
    @media print{
      @page{size:58mm auto;margin:3mm 2mm;}
      body>*{display:none!important;}
      #pra{display:block!important;}
      .r{font-family:monospace;font-size:10pt;width:52mm;line-height:1.4;}
      .rt{font-size:13pt;font-weight:bold;text-align:center;margin-bottom:2px;}
      .rm{font-size:11pt;font-weight:bold;text-align:center;}
      .rh{font-size:9pt;text-align:center;margin-bottom:4px;}
      .rl{border-top:1px dashed #000;margin:4px 0;}
      .rr{display:flex;justify-content:space-between;font-size:10pt;padding:1px 0;}
      .rrn{flex:1;}.rrp{white-space:nowrap;margin-left:4px;}
      .rtot{display:flex;justify-content:space-between;font-size:11pt;font-weight:bold;padding:2px 0;}
      .rnota{font-size:9pt;margin-top:4px;}
    }
    #pra{display:none;}
  </style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="logo">&#127958; COCO BEACH</span>
    <div class="mw">
      <span class="ml">Mesa:</span>
      <input type="number" class="mi" id="mesaInput" placeholder="&#8212;" min="1" max="99">
    </div>
    <button class="ct" onclick="openCart()">
      &#128722; <span class="bdg" id="badge">0</span>
    </button>
  </div>
  <div class="main">
    <div class="cg" id="vCats"></div>
    <div id="vProds" style="display:none"></div>
  </div>
</div>

<div class="cfo" id="cfgOverlay">
  <div class="cfp">
    <div class="cfh">
      <span class="cft" id="cfgTitle"></span>
      <button class="cfc" onclick="closeCfg()">&#10005; Cerrar</button>
    </div>
    <div class="cfpr" id="cfgProg"></div>
    <div class="cfsum" id="cfgSum">Selecciona las opciones...</div>
    <div class="cfst" id="cfgStepTitle"></div>
    <div class="cfgd" id="cfgGrid"></div>
    <div class="cfbr">
      <button class="cfbk" id="cfgBk" onclick="cfgBack()" style="display:none">&#8592; Atras</button>
      <button class="cfnx" id="cfgNx" onclick="cfgNext()" disabled>Siguiente &#8594;</button>
    </div>
  </div>
</div>

<div class="ovl" id="ovl" onclick="ovlBg(event)">
  <div class="ctp">
    <div class="ctph">
      <span class="ctpt">&#128722; Comanda</span>
      <button class="clb" onclick="closeCart()">Cerrar</button>
    </div>
    <div class="cmi">Mesa: <strong id="cartMesa">&#8212;</strong></div>
    <div id="cartItems"></div>
    <div class="nw">
      <div class="nl">Nota (opcional):</div>
      <textarea class="ni" id="nota" rows="2" placeholder="sin hielo, bien frio..."></textarea>
    </div>
    <button class="sb" id="sendBtn" onclick="enviar()">&#128228; ENVIAR COMANDA</button>
    <button class="xb" onclick="clearCart()">Vaciar carrito</button>
  </div>
</div>
<div id="pra"></div>
<div class="toast" id="toast"></div>

<script>
// ALCOHOLES
var AN=['Vodka Smirnoff','Vodka Poliakov','Ron Brugal','Ron Barcelo','Ron Bacardi',
  'Ginebra Beefeater','Ginebra P.Indias Fresa','Ginebra P.Indias Melon','Whisky Cutty Sark'];
var AP=['Vodka Absolut','Ginebra Seagrams','Whisky J.Walker Red'];
var APP=['Ginebra Martin Millers','Whisky Jack Daniels','Ron Havana 7 Anos'];
var AT=AN.concat(['Terry Centenario','Ponche Caballero','Baileys']);
var MZ=['Tonica','CocaCola','CocaCola Zero','Fanta naranja','Fanta limon','Sprite',
  'Aquarius limon','Aquarius naranja','Schweppes limon','Fuze tea limon','Fuze tea maracuya',
  'Bitter','Monster','Solo con hielo'];
var SG=['Pina','Coco','Fresa','Mango','Melon','Mojito'];
var SC=['Pina','Coco','Fresa','Mango','Melon'];

// CONFIGURADORES
var CFGS={
  copas:{
    title:'Configurar Copa',
    steps:[
      {id:'tipo',title:'Tipo de copa',opts:[{l:'Normal',p:8},{l:'Premium',p:9},{l:'Premium Plus',p:10}]},
      {id:'alcohol',title:'Alcohol',dep:'tipo',byP:{Normal:AN,Premium:AP,'Premium Plus':APP}},
      {id:'mezcla',title:'Mezcla',opts:MZ}
    ],
    nombre:function(s){return 'Copa '+s.tipo+' - '+s.alcohol+' - '+s.mezcla;},
    precio:function(s){return {Normal:8,Premium:9,'Premium Plus':10}[s.tipo]||0;}
  },
  granizado:{
    title:'Configurar Granizado',
    steps:[
      {id:'tipo',title:'Con o sin alcohol',opts:[{l:'Sin alcohol',p:3.50},{l:'Tocado Normal',p:4.00},{l:'Tocado Premium',p:5.00}]},
      {id:'alcohol',title:'Alcohol',dep:'tipo',
       skipIf:function(s){return s.tipo==='Sin alcohol';},
       byP:{'Tocado Normal':AN,'Tocado Premium':AP.concat(APP).concat(['Jagermeister','Cazalla'])}},
      {id:'sabor',title:'Sabor',opts:SG}
    ],
    nombre:function(s){
      var b='Granizado '+s.sabor;
      return s.tipo==='Sin alcohol'?b:b+' '+s.tipo+(s.alcohol?' - '+s.alcohol:'');
    },
    precio:function(s){return {'Sin alcohol':3.50,'Tocado Normal':4.00,'Tocado Premium':5.00}[s.tipo]||3.50;}
  },
  cafe_tocado:{
    title:'Cafe Tocado',
    steps:[
      {id:'cafe',title:'Que cafe?',opts:[{l:'Cafe solo',p:1.50},{l:'Cortado',p:1.80},{l:'Cafe con leche',p:2.20},{l:'Bombon',p:2.20}]},
      {id:'alcohol',title:'Tocado con...',opts:AT}
    ],
    nombre:function(s){return s.cafe+' Tocado - '+s.alcohol;},
    precio:function(s){return ({'Cafe solo':1.50,'Cortado':1.80,'Cafe con leche':2.20,'Bombon':2.20}[s.cafe]||1.50)+1.80;}
  },
  coctel:{
    title:'Configurar Coctel',
    steps:[
      {id:'tipo',title:'Tipo de coctel',opts:[
        {l:'Pina Colada',p:6},{l:'Pina Colada s/alcohol',p:6},
        {l:'Mojito Clasico',p:6},{l:'Mojito s/alcohol',p:6},
        {l:'Mojito de Sabores',p:6},{l:'Berry Pink',p:6},
        {l:'Collins de Frutas',p:7},{l:'Daiquiri',p:7}
      ]},
      {id:'sabor',title:'Sabor',dep:'tipo',
       skipIf:function(s){return ['Mojito de Sabores','Collins de Frutas','Daiquiri'].indexOf(s.tipo)<0;},
       byP:{'Mojito de Sabores':SC,'Collins de Frutas':SC,'Daiquiri':SC}}
    ],
    nombre:function(s){return s.tipo+(s.sabor?' '+s.sabor:'');},
    precio:function(s){return {'Collins de Frutas':7,'Daiquiri':7}[s.tipo]||6;}
  }
};

// MENU
var MENU=[
  {cat:'Refrescos',e:'Refresco',c:'#dc2626',items:[
    {n:'CocaCola',p:2.50},{n:'CocaCola Zero',p:2.50},{n:'Fanta limon',p:2.50},{n:'Fanta naranja',p:2.50},
    {n:'Aquarius limon',p:2.50},{n:'Aquarius naranja',p:2.50},{n:'Sprite',p:2.50},
    {n:'Fuze tea limon',p:2.50},{n:'Fuze tea maracuya',p:2.50},{n:'Schweppes tonica',p:2.50},
    {n:'Schweppes limon',p:2.50},{n:'Zumo',p:2.00},{n:'Bitter',p:3.00},{n:'Monster',p:3.50}
  ]},
  {cat:'Agua',e:'Agua',c:'#2563eb',items:[{n:'Agua',p:1.20},{n:'Agua con gas',p:2.00}]},
  {cat:'Cafe',e:'Cafe',c:'#78350f',items:[
    {n:'Cafe solo',p:1.50},{n:'Cortado',p:1.80},{n:'Cafe con leche',p:2.20},{n:'Bombon',p:2.20},
    {n:'ColaCao',p:0.30},{n:'+Hielo',p:0.50}
  ],cfgItems:[{n:'Cafe Tocado +',cfgKey:'cafe_tocado'}]},
  {cat:'Cerveza',e:'Cerveza',c:'#b45309',items:[
    {n:'Cana Aguila',p:1.80},{n:'Doble Aguila',p:2.80},{n:'Cana Radler',p:3.50},{n:'Doble Radler',p:3.50},
    {n:'Ladron Verano',p:3.00},{n:'Aguila 1/3',p:3.00},{n:'Heineken',p:3.50},{n:'Amstel Oro',p:3.50},
    {n:'Amstel 0,0',p:3.50},{n:'Heineken 0,0',p:3.50},{n:'Desperados',p:3.50},{n:'Cruzcampo 1904',p:3.50},
    {n:'18/70',p:3.50},{n:'Ladron Manzanas',p:3.50},{n:'Aguila s/filtrar',p:3.50},
    {n:'Sin gluten',p:1.50},{n:'Clara Doble',p:3.80},{n:'Tonti',p:9.00},{n:'Pinta',p:3.50}
  ]},
  {cat:'Snacks',e:'Snacks',c:'#16a34a',items:[{n:'Papas',p:2.80}]},
  {cat:'Vermut',e:'Vermut',c:'#9f1239',items:[
    {n:'Martini',p:5.80},{n:'Aperol Spritz',p:3.00},{n:'Vino blanco',p:2.50}
  ]},
  {cat:'Chupito',e:'Chupito',c:'#c2410c',items:[
    {n:'Tequila San Jose',p:2.00},{n:'Tequila fresa',p:2.50},{n:'Jagermeister',p:2.00},
    {n:'Licor arroz',p:2.00},{n:'Vodka azul',p:2.50},{n:'Cazalla',p:2.00},
    {n:'Polvora',p:2.50},{n:'Fireball',p:3.80}
  ]},
  {cat:'Granizado',e:'Granizado',c:'#0891b2',cfgKey:'granizado'},
  {cat:'Coctel',e:'Coctel',c:'#7c3aed',cfgKey:'coctel'},
  {cat:'Copas',e:'Copas',c:'#475569',cfgKey:'copas'}
];

// ESTADO
var cart={},cPx={},aIdx=-1;
var cfgKey=null,cfgStep=0,cfgSel={},cfgSteps=[];

// HELPERS
function fmt(p){return p.toFixed(2).replace('.',',')+' EUR';}
function getItem(n){for(var c of MENU){var f=(c.items||[]).find(function(i){return i.n===n;});if(f)return f;}return null;}
function getPrice(n){return cPx[n]!==undefined?cPx[n]:((getItem(n)||{p:0}).p);}
function cCount(){return Object.values(cart).reduce(function(s,v){return s+v;},0);}
function bSteps(key,sel){return CFGS[key].steps.filter(function(s){return !s.skipIf||!s.skipIf(sel);});}

// RENDER CATS
function rCats(){
  var el=document.getElementById('vCats');
  el.innerHTML=MENU.map(function(cat,i){
    var cnt=0;
    (cat.items||[]).forEach(function(it){cnt+=(cart[it.n]||0);});
    return '<button class="cb" style="background:'+cat.c+'" data-i="'+i+'">'
      +(cnt>0?'<span class="cct">'+cnt+'</span>':'')
      +'<span class="cem">'+cat.e+'</span>'
      +'<span class="cnm">'+cat.cat+'</span></button>';
  }).join('');
  el.querySelectorAll('.cb').forEach(function(btn){
    btn.onclick=function(){showCat(parseInt(btn.dataset.i));};
  });
}

function showCat(i){
  var cat=MENU[i]; aIdx=i;
  if(cat.cfgKey&&!cat.items){openCfg(cat.cfgKey);return;}
  document.getElementById('vCats').style.display='none';
  var el=document.getElementById('vProds');
  el.style.display='block';
  var allItems=(cat.items||[]).concat((cat.cfgItems||[]).map(function(ci){return {n:ci.n,p:0,cfgKey:ci.cfgKey};}));
  el.innerHTML='<button class="bb" id="bkBtn">&#8592; Categorias</button>'
    +'<div class="ch">'+cat.cat+'</div>'
    +'<div class="pg" id="pgrid">'
    +allItems.map(function(item,j){
      var q=cart[item.n]||0;
      var isCfg=!!item.cfgKey;
      return '<button class="pb'+(q>0?' ic':'')+(isCfg?' cfg':'')+'" data-j="'+j+'">'
        +(q>0?'<span class="pbdg">'+q+'</span>':'')
        +'<span class="pn">'+item.n+'</span>'
        +(item.p>0?'<span class="pp">'+fmt(item.p)+'</span>':'<span class="pp" style="color:var(--am)">Personalizado</span>')
        +'</button>';
    }).join('')+'</div>';
  document.getElementById('bkBtn').onclick=function(){showCats();};
  document.getElementById('pgrid').querySelectorAll('.pb').forEach(function(btn){
    var j=parseInt(btn.dataset.j);
    var item=allItems[j];
    btn.onclick=function(){item.cfgKey?openCfg(item.cfgKey):addItem(item.n,btn);};
  });
}

function showCats(){
  aIdx=-1;
  document.getElementById('vProds').style.display='none';
  document.getElementById('vCats').style.display='grid';
  rCats();
}

// ADD SIMPLE ITEM
function addItem(n,btn){
  cart[n]=(cart[n]||0)+1;
  updBdg();
  var q=cart[n]; var item=getItem(n);
  btn.className='pb ic';
  btn.innerHTML='<span class="pbdg">'+q+'</span>'
    +'<span class="pn">'+n+'</span>'
    +(item&&item.p>0?'<span class="pp">'+fmt(item.p)+'</span>':'');
  btn.animate&&btn.animate([{background:'#22c55e'},{background:'#0d2118'}],{duration:220});
}

function updBdg(){document.getElementById('badge').textContent=cCount();}

// CONFIGURADOR
function openCfg(key){
  cfgKey=key;cfgSel={};cfgStep=0;
  cfgSteps=bSteps(key,cfgSel);
  document.getElementById('cfgTitle').textContent=CFGS[key].title;
  document.getElementById('cfgOverlay').classList.add('open');
  rCfgStep();
}

function rCfgStep(){
  cfgSteps=bSteps(cfgKey,cfgSel);
  var step=cfgSteps[cfgStep];
  document.getElementById('cfgProg').textContent='Paso '+(cfgStep+1)+' de '+cfgSteps.length;
  document.getElementById('cfgStepTitle').textContent=step.title;
  var parts=[];
  cfgSteps.slice(0,cfgStep).forEach(function(s){if(cfgSel[s.id])parts.push(cfgSel[s.id]);});
  document.getElementById('cfgSum').textContent=parts.length?parts.join(' > '):'Selecciona las opciones...';
  var opts=step.opts||[];
  if(step.dep&&step.byP){var pv=cfgSel[step.dep];opts=(pv&&step.byP[pv])||[];}
  var grid=document.getElementById('cfgGrid');
  grid.innerHTML=opts.map(function(o){
    var l=typeof o==='string'?o:o.l;
    var p=typeof o==='object'&&o.p!==undefined?o.p:null;
    var sel=cfgSel[step.id]===l;
    return '<button class="copt'+(sel?' sel':'')+'">'
      +l+(p!==null?'<span class="copt-p">'+fmt(p)+'</span>':'')
      +'</button>';
  }).join('');
  grid.querySelectorAll('.copt').forEach(function(btn,j){
    var o=opts[j]; var l=typeof o==='string'?o:o.l;
    btn.onclick=function(){
      cfgSel[step.id]=l;
      CFGS[cfgKey].steps.forEach(function(s){if(s.dep===step.id)delete cfgSel[s.id];});
      rCfgStep();
    };
  });
  document.getElementById('cfgBk').style.display=cfgStep>0?'':'none';
  var nx=document.getElementById('cfgNx');
  var isLast=cfgStep>=cfgSteps.length-1;
  nx.innerHTML=isLast?'&#10003; Anadir al pedido':'Siguiente &#8594;';
  nx.disabled=!cfgSel[step.id];
}

function cfgNext(){
  cfgSteps=bSteps(cfgKey,cfgSel);
  if(cfgStep>=cfgSteps.length-1){
    var cfg=CFGS[cfgKey];
    var nombre=cfg.nombre(cfgSel);
    var precio=cfg.precio(cfgSel);
    cart[nombre]=(cart[nombre]||0)+1;
    cPx[nombre]=precio;
    updBdg();closeCfg();
    toast('Anadido: '+nombre);
  } else {cfgStep++;rCfgStep();}
}

function cfgBack(){if(cfgStep>0){cfgStep--;rCfgStep();}}
function closeCfg(){document.getElementById('cfgOverlay').classList.remove('open');}

// CARRITO
function openCart(){
  document.getElementById('cartMesa').textContent=document.getElementById('mesaInput').value||'?';
  rCart();
  document.getElementById('ovl').classList.add('open');
}
function closeCart(){document.getElementById('ovl').classList.remove('open');}
function ovlBg(e){if(e.target===document.getElementById('ovl'))closeCart();}

function rCart(){
  var items=Object.entries(cart).filter(function(x){return x[1]>0;});
  var el=document.getElementById('cartItems');
  var btn=document.getElementById('sendBtn');
  if(!items.length){el.innerHTML='<div class="ec">El carrito esta vacio.</div>';btn.disabled=true;return;}
  btn.disabled=false;
  var total=0;
  el.innerHTML=items.map(function(x){
    var n=x[0],q=x[1],linea=getPrice(n)*q;
    total+=linea;
    return '<div class="ci"><span class="cin">'+n+'</span>'
      +'<span class="cip">'+(linea>0?fmt(linea):'')+'</span>'
      +'<div class="qc"><button class="qb" data-n="'+n+'" data-d="-1">&#8722;</button>'
      +'<span class="qn">'+q+'</span>'
      +'<button class="qb" data-n="'+n+'" data-d="1">+</button></div></div>';
  }).join('')+'<div class="totl"><span>TOTAL</span><span>'+fmt(total)+'</span></div>';
  el.querySelectorAll('.qb').forEach(function(btn){
    btn.onclick=function(){chQty(btn.dataset.n,parseInt(btn.dataset.d));};
  });
}

function chQty(n,d){
  cart[n]=(cart[n]||0)+d;
  if(cart[n]<=0){delete cart[n];delete cPx[n];}
  updBdg();rCart();
}

function clearCart(){cart={};cPx={};updBdg();closeCart();rCats();toast('Carrito vaciado');}

// ENVIAR
async function enviar(){
  var mesa=document.getElementById('mesaInput').value.trim();
  if(!mesa){toast('Indica el numero de mesa',true);return;}
  var items=Object.entries(cart).filter(function(x){return x[1]>0;})
    .map(function(x){return {nombre:x[0],cantidad:x[1],precio:getPrice(x[0])};});
  if(!items.length){toast('El carrito esta vacio',true);return;}
  var nota=document.getElementById('nota').value.trim();
  var btn=document.getElementById('sendBtn');
  btn.disabled=true;btn.textContent='Enviando...';
  try{
    var r=await fetch('/comanda',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mesa:mesa,items:items,nota:nota})});
    if(r.ok){
      cart={};cPx={};document.getElementById('nota').value='';
      updBdg();closeCart();rCats();
      toast('Comanda enviada - Mesa '+mesa);
    } else {toast('Error al enviar',true);}
  } catch(e){toast('Sin conexion',true);}
  finally{btn.disabled=false;btn.textContent='ENVIAR COMANDA';}
}

// TOAST
function toast(msg,err){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(err?' err':'');
  setTimeout(function(){el.classList.remove('show');},2500);
}

rCats();
</script>
</body>
</html>
